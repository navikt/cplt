[tools]
rust = "1.94"

[tasks.version]
description = "Generate version string (YYYY.MM.DD-HH.MM-gitsha)"
run = "echo $(date +%Y.%m.%d)-$(date +%H.%M)-$(git rev-parse --short HEAD)"

[tasks.fmt]
description = "Format code with rustfmt"
run = "cargo fmt"

[tasks."fmt:check"]
description = "Check code formatting"
run = "cargo fmt -- --check"

[tasks.clippy]
description = "Run Clippy linter"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.build]
description = "Build debug binary"
run = """
export CPLT_LONG_VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)$(git diff --quiet HEAD 2>/dev/null || echo '-dirty')"
cargo build
"""

[tasks."build:release"]
description = "Build optimized release binary"
run = """
export CPLT_LONG_VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)$(git diff --quiet HEAD 2>/dev/null || echo '-dirty')"
cargo build --release
"""

[tasks.test]
description = "Run all tests (same as cargo test; macOS only)"
run = "cargo test"

[tasks."test:lib"]
description = "Run library crate tests (config, discover, scratch modules)"
run = "cargo test --lib"

[tasks."test:unit"]
description = "Run unit tests — cross-platform, safe inside sandbox and CI"
run = "cargo test --test unit_tests"

[tasks."test:integration"]
description = "Run integration tests — requires macOS sandbox-exec, safe inside sandbox"
run = "cargo test --test integration"

[tasks."test:e2e"]
description = "Run E2E tests — requires macOS + copilot binary in PATH"
run = "cargo test --test e2e"

[tasks."test:e2e-projects"]
description = "Run E2E project scaffold tests — requires macOS sandbox-exec"
run = "cargo test --test e2e_projects"

[tasks."test:e2e-live"]
description = "Run live smoke tests — requires macOS + Copilot auth + network"
run = "cargo test --test e2e -- --ignored"

[tasks."test:all"]
description = "Run all test suites except live smoke tests (macOS only)"
depends = ["test:unit", "test:lib", "test:integration", "test:e2e", "test:e2e-projects"]

[tasks.check]
description = "Run all checks (fmt, clippy, test) — works inside sandbox"
depends = ["fmt:check", "clippy", "test:unit", "test:lib"]

[tasks.all]
description = "Run all checks and build release"
depends = ["check", "build:release"]

[tasks.install]
description = "Build and install cplt to /usr/local/bin"
run = """
export CPLT_LONG_VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)$(git diff --quiet HEAD 2>/dev/null || echo '-dirty')"
cargo build --release && sudo cp target/release/cplt /usr/local/bin/cplt && sudo /usr/bin/xattr -cr /usr/local/bin/cplt && sudo codesign --force --sign - /usr/local/bin/cplt
"""

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.run]
description = "Build and run copilot --version inside sandbox"
run = "cargo run -- -- --version"

[tasks.setup-hooks]
description = "Install git pre-commit hook"
run = "git config core.hooksPath hack && echo 'Git hooks path set to hack/.'"
