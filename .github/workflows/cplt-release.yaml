name: cplt Release

on:
  workflow_run:
    workflows: ["cplt CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cplt-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # ratchet:dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Build release binary
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          VERSION="$(date -u +%Y.%m.%d-%H%M%S)-${SHORT_SHA}"
          CPLT_LONG_VERSION="$VERSION" cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cplt-${{ matrix.target }}.tar.gz cplt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184ef3e05a951 # v2.1.0
        with:
          subject-path: cplt-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cplt-${{ matrix.target }}
          path: cplt-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum cplt-* > SHA256SUMS
          cat SHA256SUMS

      - name: Determine version
        id: version
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE=$(date -u +%Y.%m.%d-%H%M%S)
          echo "tag=cplt/${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "title=cplt ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --list 'cplt/*' --sort=-version:refname | head -1 || echo "")
          {
            echo "body<<RELEASE_EOF"
            echo "## cplt"
            echo ""
            echo "macOS Seatbelt sandbox wrapper for GitHub Copilot CLI."
            echo ""
            echo "### Installation"
            echo ""
            echo '```bash'
            echo "# Apple Silicon (M1/M2/M3/M4)"
            echo "curl -fsSL https://github.com/navikt/cplt/releases/download/${{ steps.version.outputs.tag }}/cplt-aarch64-apple-darwin.tar.gz | tar xz"
            echo ""
            echo "# Intel Mac"
            echo "curl -fsSL https://github.com/navikt/cplt/releases/download/${{ steps.version.outputs.tag }}/cplt-x86_64-apple-darwin.tar.gz | tar xz"
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG##*/}"
              echo ""
              git log --oneline "${PREV_TAG}..HEAD" | head -20
            else
              echo "### Initial release"
            fi
            echo ""
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ steps.version.outputs.sha }}
          name: ${{ steps.version.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
          files: |
            artifacts/cplt-*
            artifacts/SHA256SUMS
